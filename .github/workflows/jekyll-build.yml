name: Jekyll Build Check

on:
  pull_request:
    branches: [ gh-pages ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Setup Ruby
      uses: ruby/setup-ruby@v1
      with:
        ruby-version: '3.1'
        bundler-cache: true
    
    - name: Install dependencies
      run: bundle install
    
    - name: Build Jekyll site
      run: bundle exec jekyll build --verbose
      env:
        JEKYLL_ENV: production
    
    - name: Verify build output
      run: |
        if [ -d "_site" ]; then
          echo "✓ Jekyll build successful - _site directory created"
          ls -la _site
        else
          echo "✗ Jekyll build failed - _site directory not found"
          exit 1
        fi
    
    - name: Upload site artifact (with baseurl for GitHub Pages)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jekyll-site-github
        path: _site/
        retention-days: 7
    
    - name: Build Jekyll site for local viewing
      run: bundle exec jekyll build --verbose --baseurl ""
      env:
        JEKYLL_ENV: production
    
    - name: Upload site artifact (local viewing without baseurl)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: jekyll-site-local
        path: _site/
        retention-days: 7
